<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOU | نظام الدفع والرسوم الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-purple: #1a1a2e;
            --card-purple: #16213e;
            --accent-gold: #ffd700;
            --text-white: #ffffff;
            --success-green: #4caf50;
            --fee-red: #ff4d4d;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-purple);
            color: var(--text-white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* شاشة الدخول المؤمنة */
        #loginOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-purple);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: var(--card-purple);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid var(--accent-gold);
            width: 80%;
            max-width: 300px;
        }

        input[type="password"] {
            padding: 12px;
            border-radius: 10px;
            border: none;
            width: 90%;
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
            background: #eee;
        }

        /* الواجهة الرئيسية */
        .container {
            width: 90%;
            max-width: 400px;
            margin-top: 40px;
            padding-bottom: 50px;
        }

        .balance-card {
            background: linear-gradient(135deg, var(--card-purple), #0f3460);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent-gold);
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-action {
            background: var(--card-purple);
            border: 1px solid rgba(255,215,0,0.2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn-action:active {
            transform: scale(0.9);
            background: var(--accent-gold);
            color: var(--bg-purple);
        }

        #history-section {
            margin-top: 30px;
            width: 100%;
            display: none;
        }

        .transaction-item {
            background: rgba(255,255,255,0.05);
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 4px solid var(--accent-gold);
        }

        .fee-text {
            font-size: 0.75rem;
            color: var(--fee-red);
            display: block;
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:var(--accent-gold); margin-top:0;">YOU SAFE</h2>
        <p style="font-size:0.9rem;">أدخل رمز الدخول الخاص بأشرف</p>
        <input type="password" id="pinInput" placeholder="••••">
        <br>
        <button onclick="checkPin()" style="background:var(--accent-gold); border:none; padding:12px 40px; border-radius:10px; font-weight:bold; cursor:pointer; width:100%;">دخول</button>
    </div>
</div>

<div class="container">
    <div class="balance-card">
        <p style="opacity: 0.8; margin: 0; font-size: 0.9rem;">الرصيد الكلي (شامل الرسوم)</p>
        <h1 id="balanceDisplay" style="font-size: 2.2rem; color: var(--accent-gold); margin: 10px 0;">0.00 EGP</h1>
    </div>

    <div class="actions-grid">
        <button class="btn-action" onclick="handleAction('فودافون كاش')">فودافون كاش</button>
        <button class="btn-action" onclick="handleAction('فوري')">فوري / أمان</button>
        <button class="btn-action" onclick="handleAction('اتصالات كاش')">اتصالات كاش</button>
        <button class="btn-action" onclick="handleAction('أخرى')">عملية أخرى</button>
    </div>

    <div id="history-section">
        <h3 style="border-right: 4px solid var(--accent-gold); padding-right: 10px; font-size: 1.1rem;">سجل العمليات الذكي</h3>
        <div id="transactions-list"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        databaseURL: "https://ashraflx71-9efae-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const SECRET_PIN = "2026"; 

    function checkPin() {
        const input = document.getElementById('pinInput').value;
        if (input === SECRET_PIN) {
            document.getElementById('loginOverlay').style.display = 'none';
            sessionStorage.setItem('isLoggedIn', 'true');
            initApp();
        } else {
            alert("الرمز السري غير صحيح!");
            document.getElementById('pinInput').value = "";
        }
    }

    function initApp() {
        database.ref('transactions').keepSynced(true);
        database.ref('transactions').on('value', (snapshot) => {
            const list = document.getElementById('transactions-list');
            const balanceText = document.getElementById('balanceDisplay');
            list.innerHTML = '';
            let totalWithFees = 0;
            const data = snapshot.val();

            if (data) {
                document.getElementById('history-section').style.display = 'block';
                Object.values(data).reverse().forEach(tx => {
                    const amount = parseFloat(tx.amount) || 0;
                    const fees = parseFloat(tx.fees) || 0;
                    totalWithFees += (amount + fees);

                    const div = document.createElement('div');
                    div.className = 'transaction-item';
                    div.innerHTML = `
                        <div>
                            <strong>${tx.type}</strong>
                            <br><small style="opacity:0.6">${tx.time}</small>
                        </div>
                        <div style="text-align:left">
                            <div style="color:var(--success-green); font-weight:bold">+${amount.toLocaleString()}</div>
                            <span class="fee-text">رسوم: ${fees.toLocaleString()}</span>
                        </div>
                    `;
                    list.appendChild(div);
                });
            }
            balanceText.innerText = totalWithFees.toLocaleString(undefined, {minimumFractionDigits:2}) + " EGP";
        });
    }

    function handleAction(type) {
        const amountStr = prompt(`إدخال مبلغ لـ ${type}:`);
        const amount = parseFloat(amountStr);

        if (amountStr && !isNaN(amount) && amount > 0) {
            let fees = 0;
            // حساب الرسوم حسب نظام السوق المصري 2026
            if (type.includes("كاش")) {
                fees = Math.max(3, amount * 0.01); // 1% بحد أدنى 3 جنيه
            } else if (type === "فوري") {
                if (amount <= 50) fees = 2;
                else if (amount <= 100) fees = 3;
                else fees = (amount * 0.01) + 2;
            }

            const total = amount + fees;
            const confirmAction = confirm(`تفاصيل العملية:\nالمبلغ: ${amount} EGP\nالرسوم: ${fees} EGP\nالإجمالي: ${total} EGP\n\nتأكيد الحفظ؟`);

            if (confirmAction) {
                const newTx = {
                    type: type,
                    amount: amount,
                    fees: fees,
                    time: new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})
                };
                database.ref('transactions').push(newTx);
                if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
            }
        }
    }

    if (sessionStorage.getItem('isLoggedIn') === 'true') {
        document.getElementById('loginOverlay').style.display = 'none';
        initApp();
    }
</script>
</body>
</html>
