<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You | دفع ذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #050505;
            --primary-purple: #4b0082; /* موف ملكي غامق */
            --secondary-purple: #2e004f; /* موف أعمق للتدريج */
            --text-white: #ffffff;
            --card-gray: #121212;
            --success-green: #00ff88;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--text-white); /* شعار أبيض ناصع */
            text-shadow: 0 0 15px var(--primary-purple);
            margin: 40px 0;
            letter-spacing: 3px;
        }

        /* كارت المحفظة بالموف الغامق */
        .wallet-card {
            background: linear-gradient(135deg, var(--primary-purple), var(--secondary-purple));
            width: 100%;
            max-width: 380px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .balance-label {
            font-size: 0.95rem;
            opacity: 0.85;
            font-weight: 400;
            color: var(--text-white);
        }

        .balance-amount {
            font-size: 2.4rem;
            font-weight: 700;
            margin-top: 10px;
            color: var(--text-white);
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 380px;
        }

        .btn-action {
            background-color: var(--card-gray);
            border: 1px solid var(--primary-purple);
            color: var(--text-white);
            padding: 25px 10px;
            border-radius: 20px;
            text-align: center;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-action:active {
            transform: scale(0.95);
            background-color: var(--primary-purple);
        }

        .status {
            margin-top: auto;
            font-size: 0.85rem;
            color: var(--success-green);
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: var(--success-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="logo">YOU</div>

    <section class="wallet-card">
        <div class="balance-label">الرصيد المتاح</div>
        <div class="balance-amount">0.00 EGP</div>
    </section>

    <nav class="actions-grid">
        <button class="btn-action">فودافون كاش</button>
        <button class="btn-action">فوري</button>
        <button class="btn-action">شحن رصيد</button>
        <button class="btn-action">تحويل أموال</button>
    </nav>

    <footer class="status">
        <span class="status-dot"></span>
        النظام يعمل بكفاءة طاقة قصوى
    </footer>

    <script>
        const buttons = document.querySelectorAll('.btn-action');
        const balanceElement = document.querySelector('.balance-amount');

        function handleAction(actionName) {
            if (navigator.vibrate) navigator.vibrate(50);
            
            const amount = prompt(`إدخال مبلغ لعملية: ${actionName}`, "100");

            if (amount && !isNaN(amount)) {
                balanceElement.innerText = "جاري المعالجة...";
                setTimeout(() => {
                    alert(`تمت عملية ${actionName} بنجاح!`);
                    balanceElement.innerText = parseFloat(amount).toLocaleString('en-US', {minimumFractionDigits: 2}) + " EGP";
                    balanceElement.style.color = "var(--success-green)";
                }, 1200);
            }
        }

        buttons.forEach(button => {
            button.addEventListener('click', () => handleAction(button.innerText));
        });
    </script>
</body>
</html>
